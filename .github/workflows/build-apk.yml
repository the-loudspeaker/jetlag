name: Build Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache/hosted
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Get short commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/jetlag-${{ steps.vars.outputs.sha_short }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetlag-${{ steps.vars.outputs.sha_short }}.apk
          path: build/app/outputs/flutter-apk/jetlag-${{ steps.vars.outputs.sha_short }}.apk

      - name: Cleanup old artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh artifact list --limit 100 --json name,databaseId,createdAt \
            --jq ". | [ .[] | select(.name | startswith(\"jetlag-\")) ] | sort_by(.createdAt) | reverse | .[5:] | .[].databaseId" \
            | xargs -I {} gh api -X DELETE /repos/${{ github.repository }}/actions/artifacts/{}